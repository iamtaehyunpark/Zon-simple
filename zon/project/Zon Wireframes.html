<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZON — Wireframes v1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1C1A18; font-family: 'Caveat', cursive; }
  </style>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="80" fill="#1C1A18"/>
      <rect x="18" y="10" width="26" height="44" rx="4" fill="#F7F4EE" stroke="#444" stroke-width="1"/>
      <rect x="47" y="10" width="26" height="44" rx="4" fill="#F7F4EE" stroke="#444" stroke-width="1"/>
      <rect x="76" y="10" width="26" height="44" rx="4" fill="#F7F4EE" stroke="#444" stroke-width="1"/>
      <rect x="22" y="14" width="18" height="12" rx="2" fill="#DEDAD2"/>
      <rect x="51" y="14" width="18" height="12" rx="2" fill="#DEDAD2"/>
      <rect x="80" y="14" width="18" height="12" rx="2" fill="#DEDAD2"/>
      <circle cx="31" cy="32" r="4" fill="#E8824A" opacity="0.8"/>
      <circle cx="60" cy="32" r="4" fill="#5A8FC0" opacity="0.8"/>
      <circle cx="89" cy="32" r="4" fill="#8B6EC4" opacity="0.8"/>
      <text x="60" y="68" font-size="8" fill="#888" text-anchor="middle" font-family="monospace">ZON WIREFRAMES</text>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="wf_shared.jsx"></script>
  <script type="text/babel" src="wf_dir_a.jsx"></script>
  <script type="text/babel" src="wf_dir_b.jsx"></script>
  <script type="text/babel" src="wf_dir_c.jsx"></script>
  <script type="text/babel" src="wf_dir_final.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    function App() {
      return (
        <DesignCanvas title="ZON Wireframes · v1 · All 5 tabs × 3 directions">
          <DCSection id="dir-a" title="Direction A — Living Map" subtitle="The map breathes with your route. Full-bleed, always alive. Stamps carve moments out of your movement.">
            <DCArtboard id="a-concept" label="Concept" width={260} height={844}><A_Concept /></DCArtboard>
            <DCArtboard id="a-map"     label="Map · Home"  width={390} height={844}><A_Map /></DCArtboard>
            <DCArtboard id="a-feed"    label="Feed"        width={390} height={844}><A_Feed /></DCArtboard>
            <DCArtboard id="a-checkin" label="Check-in"    width={390} height={844}><A_Checkin /></DCArtboard>
            <DCArtboard id="a-time"    label="Timeline"    width={390} height={844}><A_Timeline /></DCArtboard>
            <DCArtboard id="a-profile" label="Profile"     width={390} height={844}><A_Profile /></DCArtboard>
          </DCSection>

          <DCSection id="dir-b" title="Direction B — Diary on Canvas" subtitle="The map is the canvas you journal on. A diary drawer slides over it. Writing a stamp feels like a journal entry.">
            <DCArtboard id="b-concept" label="Concept"     width={260} height={844}><B_Concept /></DCArtboard>
            <DCArtboard id="b-map"     label="Map · Home"  width={390} height={844}><B_Map /></DCArtboard>
            <DCArtboard id="b-feed"    label="Feed"        width={390} height={844}><B_Feed /></DCArtboard>
            <DCArtboard id="b-checkin" label="Check-in"    width={390} height={844}><B_Checkin /></DCArtboard>
            <DCArtboard id="b-time"    label="Timeline"    width={390} height={844}><B_Timeline /></DCArtboard>
            <DCArtboard id="b-profile" label="Profile"     width={390} height={844}><B_Profile /></DCArtboard>
          </DCSection>

          <DCSection id="dir-c" title="Direction C — Place Collector" subtitle="Places are what you collect. Map shows clusters of visited spots. Your profile is a trophy case of cities, places, stamps.">
            <DCArtboard id="c-concept" label="Concept"     width={260} height={844}><C_Concept /></DCArtboard>
            <DCArtboard id="c-map"     label="Map · Home"  width={390} height={844}><C_Map /></DCArtboard>
            <DCArtboard id="c-feed"    label="Feed"        width={390} height={844}><C_Feed /></DCArtboard>
            <DCArtboard id="c-checkin" label="Check-in"    width={390} height={844}><C_Checkin /></DCArtboard>
            <DCArtboard id="c-time"    label="Timeline"    width={390} height={844}><C_Timeline /></DCArtboard>
            <DCArtboard id="c-profile" label="Profile"     width={390} height={844}><C_Profile /></DCArtboard>
          </DCSection>

          <DCSection id="dir-d" title="Direction D — ZON Merged" subtitle="Place-collector map (C) + warm social stamp feed + simple check-in / timeline / profile. The full merged direction.">
            <DCArtboard id="d-concept" label="Concept"    width={260} height={844}><D_Concept /></DCArtboard>
            <DCArtboard id="d-map"     label="Map · Home" width={390} height={844}><D_Map /></DCArtboard>
            <DCArtboard id="d-feed"    label="Feed"       width={390} height={844}><D_Feed /></DCArtboard>
            <DCArtboard id="d-checkin" label="Check-in"   width={390} height={844}><D_Checkin /></DCArtboard>
            <DCArtboard id="d-time"    label="Timeline"   width={390} height={844}><D_Timeline /></DCArtboard>
            <DCArtboard id="d-profile" label="Profile"    width={390} height={844}><D_Profile /></DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
