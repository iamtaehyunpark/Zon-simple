<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZON — Prototype · Direction D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900;1,9..40,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1C1A18;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      height: 100vh;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    .phone-outer {
      position: relative;
      transform-origin: center center;
      transition: transform 0.2s ease;
    }

    /* Phone frame */
    .phone-frame {
      position: relative;
      width: 390px;
      height: 844px;
      border-radius: 52px;
      background: #0A0908;
      box-shadow:
        0 0 0 1.5px #3A3634,
        0 0 0 3px #1C1A18,
        0 30px 80px rgba(0,0,0,0.7),
        inset 0 0 0 1px rgba(255,255,255,0.06);
      overflow: hidden;
      flex-shrink: 0;
    }

    /* Dynamic island */
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 12px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #0A0908;
      border-radius: 17px;
      z-index: 9999;
    }

    /* Screen area */
    .phone-screen {
      position: absolute;
      inset: 0;
      border-radius: 52px;
      overflow: hidden;
    }

    #root {
      width: 390px;
      height: 844px;
      overflow: hidden;
    }

    /* Label below phone */
    .phone-label {
      font-size: 11px;
      position: absolute;
      bottom: -32px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    /* Scrollbar reset */
    * { scrollbar-width: none; }
    *::-webkit-scrollbar { display: none; }

    /* Animations */
    @keyframes slideIn {
      from { transform: translateX(32px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes fabIn {
      from { transform: translateY(12px) scale(0.94); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    /* Material symbols rendering */
    .material-symbols-rounded {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      user-select: none;
    }

    /* Tweak panel */
    .tweaks {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
    }
    .tweak-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 9999px;
      color: rgba(255,255,255,0.7);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.15s;
      letter-spacing: 0.04em;
    }
    .tweak-btn:hover { background: rgba(255,255,255,0.18); }
    .tweak-btn.active { background: rgba(139,110,196,0.5); border-color: rgba(139,110,196,0.6); color: white; }

    /* Instructions hint */
    .hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.05em;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="80" fill="#1C1A18"/>
      <rect x="38" y="6" width="44" height="68" rx="8" fill="#F7F4EE"/>
      <rect x="42" y="14" width="36" height="22" rx="3" fill="#E8E2D8"/>
      <path d="M44,22 Q54,18 60,20 T76,16" stroke="#8B6EC4" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
      <circle cx="56" cy="21" r="3" fill="#8B6EC4"/>
      <circle cx="66" cy="19" r="3" fill="#8B6EC4"/>
      <rect x="42" y="40" width="36" height="6" rx="3" fill="#E8E4DC"/>
      <rect x="42" y="50" width="10" height="10" rx="2" fill="#C8B4DC"/>
      <rect x="54" y="50" width="10" height="10" rx="2" fill="#B4C8A8"/>
      <rect x="66" y="50" width="10" height="10" rx="2" fill="#D4B4A0"/>
      <text x="60" y="78" font-size="6" fill="rgba(255,255,255,0.3)" text-anchor="middle" font-family="monospace">ZON PROTOTYPE</text>
    </svg>
  </template>
</head>
<body>

  <!-- Tweak bar -->
  <div class="tweaks" id="tweaks">
    <span style="font-family:'DM Sans',sans-serif;font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:0.06em;text-transform:uppercase;font-weight:700;margin-bottom:2px">Brand</span>
    <button class="tweak-btn active" id="tw-purple" onclick="setBrand('#8B6EC4','purple')">Purple</button>
    <button class="tweak-btn" id="tw-teal"   onclick="setBrand('#1D9E8F','teal')">Teal</button>
    <button class="tweak-btn" id="tw-forest" onclick="setBrand('#2D7A4A','forest')">Forest</button>
  </div>

  <div class="phone-outer" id="phoneOuter">
    <div class="phone-frame">
      <div class="phone-screen">
        <div id="root"></div>
      </div>
    </div>
    <span class="phone-label">ZON · Direction D · Interactive Prototype</span>
  </div>

  <span class="hint">Tap tabs · FAB + · Tap cards to navigate screens</span>

  <script>
    // Phone scaling — fit within viewport
    function scalePhone() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const availW = vw - 160; // leave room for tweak panel
      const availH = vh - 48;
      const scale = Math.min(1, availW / 390, availH / 844);
      const el = document.getElementById('phoneOuter');
      if (el) el.style.transform = 'scale(' + scale + ')';
    }
    window.addEventListener('resize', scalePhone);
    scalePhone();

    // Brand color tweaks (updates CSS variable used via inline style references)
    const BRANDS = { purple:'#8B6EC4', teal:'#1D9E8F', forest:'#2D7A4A' };
    function setBrand(color, key) {
      // Update T object after React has mounted
      if (window.T) {
        window.T.brand = color;
        window.T.brandDark = shiftColor(color, -20);
        window.T.brandSoft = hexToRgba(color, 0.13);
        window.T.brandSoft2 = hexToRgba(color, 0.06);
      }
      // Update active button
      document.querySelectorAll('.tweak-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tw-' + key).classList.add('active');
      // Force re-render by dispatching a custom event
      window.dispatchEvent(new CustomEvent('zon-brand-change', { detail: { color, key } }));
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function shiftColor(hex, amount) {
      const r = Math.max(0,Math.min(255, parseInt(hex.slice(1,3),16)+amount));
      const g = Math.max(0,Math.min(255, parseInt(hex.slice(3,5),16)+amount));
      const b = Math.max(0,Math.min(255, parseInt(hex.slice(5,7),16)+amount));
      return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
    }
  </script>

  <!-- Load JSX files in dependency order -->
  <script type="text/babel" src="zon-tokens.jsx"></script>
  <script type="text/babel" src="zon-primitives.jsx"></script>
  <script type="text/babel" src="zon-cards.jsx"></script>
  <script type="text/babel" src="zon-screens-main.jsx"></script>
  <script type="text/babel" src="zon-screens-tl.jsx"></script>
  <script type="text/babel" src="zon-screens-sub.jsx"></script>
  <script type="text/babel" src="zon-screens-modal.jsx"></script>
  <script type="text/babel" src="zon-app.jsx"></script>
  <script>setTimeout(scalePhone, 300);</script>

</body>
</html>
