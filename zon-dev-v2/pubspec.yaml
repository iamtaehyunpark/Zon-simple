name: zon
description: Place-based diary SNS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # Backend
  supabase_flutter: ^2.5.0

  # Maps
  mapbox_maps_flutter: ^2.2.0

  # Location
  geolocator: ^12.0.0

  # Photo access + EXIF (photo_manager handles EXIF natively via latlngAsync)
  photo_manager: ^3.3.0

  # Notifications
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^17.0.0

  # Data models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local storage
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.4.3

  # Media
  image_picker: ^1.1.2
  flutter_image_compress: ^2.2.0
  cached_network_image: ^3.3.1

  # Voice memos
  record: ^5.1.2
  audioplayers: ^6.1.0

  # Fonts
  google_fonts: ^6.2.1

  # Utils
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  path_provider: ^2.1.3
  uuid: ^4.4.0
  fpdart: ^1.1.0
  firebase_core: ^4.0.0
  flutter_web_auth_2: ^5.0.3
  url_launcher: ^6.3.0

# record 5.2.1 caps record_linux at <1.0.0, forcing the stale 0.7.2 which does
# not implement record_platform_interface 1.6.0 (startStream / hasPermission),
# breaking compilation even for iOS-only builds. 1.3.1 fixes it on the same 1.x
# interface that record_darwin uses.
dependency_overrides:
  record_linux: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
